<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>猫の体調管理アプリ Ultimate</title>
<link rel="manifest" href="manifest.json">
<style>
:root{
--bg:#f6f9ff;
--card:#ffffff;
--text:#263238;
--sub:#5f6b73;
--line:#d9e2ec;
--primary:#4a90e2;
--primary-strong:#2f6fc7;
--success:#22c55e;
--warning:#f59e0b;
--danger:#ef4444;
--shadow:0 10px 24px rgba(34,62,105,.08);
}

body.dark{
--bg:#0f1724;
--card:#1f2937;
--text:#f3f4f6;
--sub:#cbd5e1;
--line:#3e4a5d;
--primary:#60a5fa;
--primary-strong:#3b82f6;
--shadow:0 10px 24px rgba(0,0,0,.28);
}

*{box-sizing:border-box}

html{
scroll-behavior:smooth;
}

body{
margin:0;
font-family:"Hiragino Sans","Yu Gothic",sans-serif;
background:var(--bg);
color:var(--text);
overflow-x:hidden;
}

.container{
max-width:980px;
margin:0 auto;
padding:16px;
padding-bottom:170px;
}

.topbar{
display:flex;
justify-content:space-between;
align-items:center;
gap:12px;
flex-wrap:wrap;
margin-bottom:16px;
}

h1{
margin:0;
font-size:30px;
}

h2{
margin:0 0 12px;
font-size:22px;
}

.card{
background:var(--card);
border:1px solid var(--line);
border-radius:20px;
box-shadow:var(--shadow);
padding:16px;
margin-bottom:16px;
}

.hero{
display:grid;
grid-template-columns:240px 1fr;
gap:16px;
align-items:center;
}

.cat-box{
min-height:220px;
border-radius:18px;
background:linear-gradient(180deg,#fffaf2 0%,#fff3df 100%);
display:flex;
justify-content:center;
align-items:center;
}

body.dark .cat-box{
background:linear-gradient(180deg,#2b3442 0%,#1f2937 100%);
}

.cat-svg{
width:190px;
height:auto;
display:block;
transform-origin:center bottom;
}

.jump{
animation:jump .55s ease;
}

@keyframes jump{
0%{transform:translateY(0)}
30%{transform:translateY(-18px)}
60%{transform:translateY(0)}
100%{transform:translateY(-4px)}
}

.face-part{
transition:opacity .2s ease;
}

.hidden-face{
opacity:0;
pointer-events:none;
}

.blink{
animation:blink 4s infinite;
transform-origin:center center;
}

@keyframes blink{
0%,90%,100%{transform:scaleY(1)}
95%{transform:scaleY(.08)}
}

.badge{
display:inline-block;
padding:6px 12px;
border-radius:999px;
background:#ffe8bd;
color:#7a4f13;
font-weight:700;
font-size:13px;
margin-bottom:10px;
}

body.dark .badge{
background:#374151;
color:#f9fafb;
}

.message{
border:1px dashed var(--primary);
background:rgba(74,144,226,.08);
border-radius:14px;
padding:14px;
line-height:1.7;
}

.grid-2{
display:grid;
grid-template-columns:repeat(2,1fr);
gap:14px;
}

.full{
grid-column:1 / -1;
}

.form-group{
display:flex;
flex-direction:column;
}

label{
font-weight:700;
margin-bottom:6px;
}

input,select,textarea,button{
font-size:16px;
font-family:inherit;
}

input,select,textarea{
width:100%;
padding:10px 12px;
border-radius:12px;
border:1px solid var(--line);
background:var(--card);
color:var(--text);
}

textarea{
min-height:96px;
resize:vertical;
}

.row{
display:flex;
flex-wrap:wrap;
gap:10px;
}

.btn{
border:none;
border-radius:12px;
padding:11px 14px;
font-weight:700;
cursor:pointer;
}

.btn-primary{background:var(--primary);color:#fff}
.btn-primary:hover{background:var(--primary-strong)}
.btn-secondary{background:#6b7280;color:#fff}
.btn-success{background:var(--success);color:#fff}
.btn-warning{background:var(--warning);color:#fff}
.btn-danger{background:var(--danger);color:#fff}

.summary-grid{
display:grid;
grid-template-columns:repeat(4,1fr);
gap:14px;
}

.summary{
border:1px solid var(--line);
border-radius:16px;
padding:14px;
}

.summary strong{
display:block;
color:var(--sub);
font-size:13px;
margin-bottom:6px;
}

.summary span{
font-size:24px;
font-weight:700;
}

.filters{
display:flex;
flex-wrap:wrap;
gap:10px;
align-items:end;
margin-bottom:14px;
}

.filters .item{
min-width:170px;
flex:1;
}

.choice-wrap{
border:1px solid var(--line);
border-radius:16px;
padding:14px;
}

.choice-grid{
display:grid;
grid-template-columns:repeat(3,1fr);
gap:12px;
}

.choice-grid.two{
grid-template-columns:repeat(2,1fr);
}

.choice-item{
min-width:0;
}

.choice-item label{
display:flex;
align-items:center;
justify-content:flex-start;
gap:10px;
margin:0;
padding:12px 14px;
min-height:56px;
border:1px solid var(--line);
border-radius:14px;
background:var(--card);
font-weight:500;
line-height:1.4;
white-space:normal;
word-break:keep-all;
writing-mode:horizontal-tb;
text-orientation:mixed;
overflow-wrap:break-word;
}

.choice-item input{
width:20px;
height:20px;
margin:0;
flex:0 0 auto;
}

.list{
margin:0;
padding-left:18px;
line-height:1.9;
}

.chart-wrap{
overflow-x:auto;
-webkit-overflow-scrolling:touch;
}

canvas{
width:100%;
max-width:100%;
border:1px solid var(--line);
border-radius:14px;
margin-bottom:12px;
background:transparent;
}

.table-wrap{
overflow-x:auto;
-webkit-overflow-scrolling:touch;
}

table{
width:100%;
min-width:900px;
border-collapse:collapse;
}

th,td{
border:1px solid var(--line);
padding:10px;
text-align:center;
vertical-align:middle;
}

thead{
background:var(--primary);
color:#fff;
}

.row-good{background:rgba(34,197,94,.12)}
.row-normal{background:rgba(245,158,11,.12)}
.row-bad{background:rgba(239,68,68,.12)}

.status{
display:inline-block;
padding:4px 10px;
border-radius:999px;
color:#fff;
font-size:12px;
font-weight:700;
}

.status-good{background:var(--success)}
.status-normal{background:var(--warning)}
.status-bad{background:var(--danger)}

.actions{
display:flex;
flex-wrap:wrap;
gap:8px;
justify-content:center;
}

.install-box{
display:none;
align-items:center;
justify-content:space-between;
gap:10px;
padding:12px 14px;
border-radius:14px;
border:1px dashed var(--primary);
background:rgba(74,144,226,.08);
margin-bottom:16px;
}

.install-box.show{
display:flex;
}

.bottom-tabs{
position:fixed;
left:50%;
bottom:10px;
transform:translateX(-50%);
width:min(96%,920px);
display:grid;
grid-template-columns:repeat(7,1fr);
gap:8px;
padding:10px;
background:rgba(255,255,255,.96);
border:1px solid var(--line);
border-radius:20px;
backdrop-filter:blur(10px);
-webkit-backdrop-filter:blur(10px);
z-index:999;
}

body.dark .bottom-tabs{
background:rgba(31,41,55,.96);
}

.tab-btn{
border:none;
border-radius:14px;
background:transparent;
color:var(--sub);
padding:10px 6px;
display:flex;
flex-direction:column;
align-items:center;
justify-content:center;
gap:4px;
font-size:12px;
font-weight:700;
cursor:pointer;
min-height:64px;
}

.tab-btn .icon{
font-size:20px;
line-height:1;
}

.tab-btn.active{
background:var(--primary);
color:#fff;
}

.section-title-row{
display:flex;
justify-content:space-between;
gap:12px;
align-items:center;
flex-wrap:wrap;
margin-bottom:12px;
}

@media (max-width:900px){
.hero,
.grid-2,
.summary-grid{
grid-template-columns:1fr;
}
}

@media screen and (max-width:768px){
html,body{
width:100% !important;
max-width:100% !important;
overflow-x:hidden !important;
}

.container{
padding:12px;
padding-bottom:190px;
width:100% !important;
max-width:100% !important;
}

.hero{
grid-template-columns:1fr;
gap:12px;
}

.cat-box{
min-height:180px;
}

.cat-svg{
width:160px;
}

.grid-2,
.summary-grid{
grid-template-columns:1fr;
}

.choice-wrap,
.choice-grid,
.choice-grid.two,
.choice-item,
.choice-item label{
width:100% !important;
max-width:100% !important;
}

.choice-grid,
.choice-grid.two{
display:grid !important;
grid-template-columns:1fr !important;
gap:10px !important;
}

.choice-item label{
display:flex !important;
flex-direction:row !important;
align-items:center !important;
justify-content:flex-start !important;
gap:10px !important;
min-height:52px !important;
padding:12px !important;
font-size:16px !important;
line-height:1.5 !important;
writing-mode:horizontal-tb !important;
text-orientation:mixed !important;
white-space:normal !important;
word-break:keep-all !important;
overflow-wrap:break-word !important;
}

.choice-item input[type="checkbox"],
.choice-item input[type="radio"]{
flex:0 0 auto !important;
width:20px !important;
height:20px !important;
margin:0 !important;
}

.bottom-tabs{
width:calc(100% - 14px);
grid-template-columns:repeat(4,1fr);
gap:6px;
padding:8px;
bottom:8px;
}

.tab-btn{
min-height:58px;
font-size:11px;
}

.tab-btn .icon{
font-size:18px;
}
}

@media (max-width:480px){
.container{
padding-bottom:205px;
}

.topbar{
align-items:stretch;
}

.topbar .row{
width:100%;
}

.topbar .row .btn{
flex:1;
}
}
</style>
</head>
<body>
<div class="container">
<div class="topbar">
<h1>猫の体調管理アプリ Ultimate</h1>
<div class="row">
<button class="btn btn-primary" id="themeBtn" type="button">🌙 ダークモード</button>
<button class="btn btn-secondary" id="printBtn" type="button">🖨 印刷</button>
</div>
</div>

<div class="install-box" id="installBox">
<div>ホーム画面に追加してアプリっぽく使えます。</div>
<button class="btn btn-primary" id="installBtn" type="button">インストール</button>
</div>

<section class="card hero">
<div class="cat-box">
<svg class="cat-svg" viewBox="0 0 260 260" xmlns="http://www.w3.org/2000/svg" aria-label="猫のイラスト">
<path d="M205 185 C240 165, 242 220, 205 222" fill="none" stroke="#d69a63" stroke-width="14" stroke-linecap="round"/>
<polygon points="70,55 98,20 112,72" fill="#d69a63"/>
<polygon points="148,72 162,20 190,55" fill="#d69a63"/>
<polygon points="81,55 98,34 107,67" fill="#f6c7c0"/>
<polygon points="153,67 162,34 179,55" fill="#f6c7c0"/>
<circle cx="130" cy="105" r="62" fill="#d69a63"/>
<circle cx="108" cy="97" r="2.2" fill="#ffffff"/>
<circle cx="158" cy="97" r="2.2" fill="#ffffff"/>

<g id="face-normal-eyes" class="face-part blink">
<ellipse cx="105" cy="102" rx="8" ry="12" fill="#2f2f2f"/>
<ellipse cx="155" cy="102" rx="8" ry="12" fill="#2f2f2f"/>
</g>

<g id="face-good-eyes" class="face-part hidden-face blink">
<path d="M95 103 Q105 92 115 103" fill="none" stroke="#2f2f2f" stroke-width="4" stroke-linecap="round"/>
<path d="M145 103 Q155 92 165 103" fill="none" stroke="#2f2f2f" stroke-width="4" stroke-linecap="round"/>
</g>

<g id="face-bad-eyes" class="face-part hidden-face blink">
<path d="M95 97 Q105 107 115 97" fill="none" stroke="#2f2f2f" stroke-width="4" stroke-linecap="round"/>
<path d="M145 97 Q155 107 165 97" fill="none" stroke="#2f2f2f" stroke-width="4" stroke-linecap="round"/>
</g>

<g id="face-fever-eyes" class="face-part hidden-face">
<line x1="96" y1="101" x2="114" y2="105" stroke="#2f2f2f" stroke-width="4" stroke-linecap="round"/>
<line x1="146" y1="105" x2="164" y2="101" stroke="#2f2f2f" stroke-width="4" stroke-linecap="round"/>
</g>

<polygon points="130,118 122,127 138,127" fill="#d87c8a"/>

<g id="mouth-normal" class="face-part">
<path d="M130 128 Q122 137 116 138" fill="none" stroke="#6b4a2c" stroke-width="3" stroke-linecap="round"/>
<path d="M130 128 Q138 137 144 138" fill="none" stroke="#6b4a2c" stroke-width="3" stroke-linecap="round"/>
</g>

<g id="mouth-good" class="face-part hidden-face">
<path d="M114 132 Q130 147 146 132" fill="none" stroke="#6b4a2c" stroke-width="4" stroke-linecap="round"/>
</g>

<g id="mouth-bad" class="face-part hidden-face">
<path d="M116 142 Q130 129 144 142" fill="none" stroke="#6b4a2c" stroke-width="4" stroke-linecap="round"/>
</g>

<g id="mouth-fever" class="face-part hidden-face">
<ellipse cx="130" cy="138" rx="8" ry="10" fill="#6b4a2c"/>
</g>

<g id="fever-sweat" class="face-part hidden-face">
<path d="M176 78 C182 66, 192 78, 184 90 C180 95, 172 90, 176 78Z" fill="#7ec8ff"/>
</g>

<line x1="90" y1="126" x2="50" y2="118" stroke="#6b4a2c" stroke-width="3" stroke-linecap="round"/>
<line x1="90" y1="132" x2="50" y2="134" stroke="#6b4a2c" stroke-width="3" stroke-linecap="round"/>
<line x1="170" y1="126" x2="210" y2="118" stroke="#6b4a2c" stroke-width="3" stroke-linecap="round"/>
<line x1="170" y1="132" x2="210" y2="134" stroke="#6b4a2c" stroke-width="3" stroke-linecap="round"/>

<ellipse cx="130" cy="195" rx="68" ry="52" fill="#d69a63"/>
<ellipse cx="130" cy="204" rx="34" ry="28" fill="#f7dfbf"/>
<ellipse cx="102" cy="232" rx="15" ry="10" fill="#c88a56"/>
<ellipse cx="158" cy="232" rx="15" ry="10" fill="#c88a56"/>
</svg>
</div>

<div>
<div class="badge" id="catStatus">ふつうモード</div>
<div class="message" id="catMessage">今日はどんな体調だったか、記録してみようにゃ。</div>
</div>
</section>

<section class="card" id="section-form">
<div class="section-title-row">
<h2 id="formTitle">体調を記録する</h2>
<button class="btn btn-secondary" id="todayBtn" type="button">今日の日付</button>
</div>

<div class="grid-2">
<div class="form-group">
<label for="date">日付</label>
<input type="date" id="date">
</div>

<div class="form-group">
<label for="temperature">体温（℃）</label>
<input type="number" id="temperature" step="0.1" placeholder="例: 36.5">
</div>

<div class="form-group">
<label for="condition">体調</label>
<select id="condition">
<option value="">選択してください</option>
<option value="良い">良い</option>
<option value="普通">普通</option>
<option value="悪い">悪い</option>
</select>
</div>

<div class="form-group">
<label for="sleep">睡眠時間</label>
<input type="number" id="sleep" step="0.1" placeholder="例: 7">
</div>

<div class="form-group full">
<label>今日のクイック状態</label>
<div class="choice-wrap">
<div class="choice-grid">
<div class="choice-item"><label><input type="radio" name="quickCondition" value="良い"> 元気</label></div>
<div class="choice-item"><label><input type="radio" name="quickCondition" value="普通"> まあまあ</label></div>
<div class="choice-item"><label><input type="radio" name="quickCondition" value="悪い"> しんどい</label></div>
</div>
</div>
</div>

<div class="form-group full">
<label>服薬チェック</label>
<div class="choice-wrap">
<div class="choice-grid">
<div class="choice-item"><label><input type="checkbox" id="morningMed"> 朝 飲んだ</label></div>
<div class="choice-item"><label><input type="checkbox" id="noonMed"> 昼 飲んだ</label></div>
<div class="choice-item"><label><input type="checkbox" id="nightMed"> 夜 飲んだ</label></div>
</div>
</div>
</div>

<div class="form-group full">
<label>症状チェック</label>
<div class="choice-wrap">
<div class="choice-grid two" id="symptomBox">
<div class="choice-item"><label><input type="checkbox" value="頭痛"> 頭痛</label></div>
<div class="choice-item"><label><input type="checkbox" value="だるさ"> だるさ</label></div>
<div class="choice-item"><label><input type="checkbox" value="吐き気"> 吐き気</label></div>
<div class="choice-item"><label><input type="checkbox" value="発熱"> 発熱</label></div>
<div class="choice-item"><label><input type="checkbox" value="咳"> 咳</label></div>
<div class="choice-item"><label><input type="checkbox" value="喉の痛み"> 喉の痛み</label></div>
<div class="choice-item"><label><input type="checkbox" value="腹痛"> 腹痛</label></div>
<div class="choice-item"><label><input type="checkbox" value="めまい"> めまい</label></div>
<div class="choice-item"><label><input type="checkbox" value="不安感"> 不安感</label></div>
<div class="choice-item"><label><input type="checkbox" value="食欲低下"> 食欲低下</label></div>
</div>
</div>
</div>

<div class="form-group full">
<label for="memo">メモ</label>
<textarea id="memo" placeholder="体調、服薬、出来事などを入力"></textarea>
</div>
</div>

<div class="row">
<button class="btn btn-primary" id="saveBtn" type="button">保存</button>
<button class="btn btn-secondary" id="cancelEditBtn" type="button" style="display:none;">編集キャンセル</button>
<button class="btn btn-success" id="exportBtn" type="button">JSON書き出し</button>
<button class="btn btn-warning" id="importBtn" type="button">JSON読み込み</button>
<button class="btn btn-danger" id="clearBtn" type="button">全削除</button>
<input type="file" id="importFile" accept=".json,application/json" style="display:none;">
</div>
</section>

<section class="card" id="section-summary">
<h2>集計</h2>
<div class="filters">
<div class="item">
<label for="monthFilter">月</label>
<input type="month" id="monthFilter">
</div>
<div class="item">
<label for="conditionFilter">体調</label>
<select id="conditionFilter">
<option value="">すべて</option>
<option value="良い">良い</option>
<option value="普通">普通</option>
<option value="悪い">悪い</option>
</select>
</div>
<div class="item">
<label for="keywordFilter">キーワード</label>
<input type="text" id="keywordFilter" placeholder="メモ・症状検索">
</div>
<div class="row">
<button class="btn btn-secondary" id="showAllBtn" type="button">全件表示</button>
</div>
</div>

<div class="summary-grid">
<div class="summary"><strong>記録件数</strong><span id="totalCount">0</span></div>
<div class="summary"><strong>平均体温</strong><span id="avgTemp">0℃</span></div>
<div class="summary"><strong>平均睡眠</strong><span id="avgSleep">0時間</span></div>
<div class="summary"><strong>悪い日数</strong><span id="badCount">0</span></div>
</div>
</section>

<section class="card" id="section-ranking">
<h2>症状ランキング</h2>
<ol id="symptomRanking" class="list"></ol>
</section>

<section class="card" id="section-chart">
<h2>グラフ</h2>
<div class="chart-wrap">
<canvas id="tempChart" width="1000" height="320"></canvas>
<canvas id="sleepChart" width="1000" height="320"></canvas>
</div>
</section>

<section class="card" id="section-list">
<h2>記録一覧</h2>
<div class="table-wrap">
<table>
<thead>
<tr>
<th>日付</th>
<th>体温</th>
<th>体調</th>
<th>睡眠</th>
<th>服薬</th>
<th>症状</th>
<th>メモ</th>
<th>操作</th>
</tr>
</thead>
<tbody id="recordList"></tbody>
</table>
</div>
</section>
</div>

<nav class="bottom-tabs">
<button class="tab-btn active" type="button" data-target="section-form"><span class="icon">✍️</span><span>記録</span></button>
<button class="tab-btn" type="button" data-target="section-summary"><span class="icon">📊</span><span>集計</span></button>
<button class="tab-btn" type="button" data-target="section-ranking"><span class="icon">🏆</span><span>症状</span></button>
<button class="tab-btn" type="button" data-target="section-chart"><span class="icon">📈</span><span>グラフ</span></button>
<button class="tab-btn" type="button" data-target="section-list"><span class="icon">📋</span><span>一覧</span></button>
<button class="tab-btn" type="button" id="exportTabBtn"><span class="icon">💾</span><span>保存</span></button>
<button class="tab-btn" type="button" id="importTabBtn"><span class="icon">📂</span><span>読込</span></button>
</nav>

<script>
const STORAGE_KEY = "cat-health-complete-html-lite";
const THEME_KEY = "cat-health-theme-lite";

const dateInput = document.getElementById("date");
const temperatureInput = document.getElementById("temperature");
const conditionInput = document.getElementById("condition");
const sleepInput = document.getElementById("sleep");
const memoInput = document.getElementById("memo");

const morningMedInput = document.getElementById("morningMed");
const noonMedInput = document.getElementById("noonMed");
const nightMedInput = document.getElementById("nightMed");

const symptomBox = document.getElementById("symptomBox");

const saveBtn = document.getElementById("saveBtn");
const cancelEditBtn = document.getElementById("cancelEditBtn");
const todayBtn = document.getElementById("todayBtn");
const exportBtn = document.getElementById("exportBtn");
const importBtn = document.getElementById("importBtn");
const clearBtn = document.getElementById("clearBtn");
const importFile = document.getElementById("importFile");

const monthFilter = document.getElementById("monthFilter");
const conditionFilter = document.getElementById("conditionFilter");
const keywordFilter = document.getElementById("keywordFilter");
const showAllBtn = document.getElementById("showAllBtn");

const totalCountEl = document.getElementById("totalCount");
const avgTempEl = document.getElementById("avgTemp");
const avgSleepEl = document.getElementById("avgSleep");
const badCountEl = document.getElementById("badCount");
const recordList = document.getElementById("recordList");
const symptomRankingEl = document.getElementById("symptomRanking");

const catStatusEl = document.getElementById("catStatus");
const catMessageEl = document.getElementById("catMessage");
const themeBtn = document.getElementById("themeBtn");
const printBtn = document.getElementById("printBtn");

const tempCanvas = document.getElementById("tempChart");
const sleepCanvas = document.getElementById("sleepChart");
const tempCtx = tempCanvas.getContext("2d");
const sleepCtx = sleepCanvas.getContext("2d");

const installBox = document.getElementById("installBox");
const installBtn = document.getElementById("installBtn");

let deferredPrompt = null;
let records = JSON.parse(localStorage.getItem(STORAGE_KEY) || "[]");
let editId = null;

function getTodayString(){
return new Date().toISOString().split("T")[0];
}

function setToday(){
dateInput.value = getTodayString();
}

function escapeHtml(text){
return String(text)
.replace(/&/g,"&amp;")
.replace(/</g,"&lt;")
.replace(/>/g,"&gt;")
.replace(/"/g,"&quot;")
.replace(/'/g,"&#039;");
}

function saveRecords(){
localStorage.setItem(STORAGE_KEY, JSON.stringify(records));
}

function getSelectedSymptoms(){
return [...symptomBox.querySelectorAll('input[type="checkbox"]:checked')].map(x => x.value);
}

function setSelectedSymptoms(symptoms){
symptomBox.querySelectorAll('input[type="checkbox"]').forEach(cb => {
cb.checked = symptoms.includes(cb.value);
});
}

function hideAllFaces(){
[
"face-normal-eyes","face-good-eyes","face-bad-eyes","face-fever-eyes",
"mouth-normal","mouth-good","mouth-bad","mouth-fever","fever-sweat"
].forEach(id => document.getElementById(id).classList.add("hidden-face"));
}

function showFace(mode){
hideAllFaces();
if(mode === "good"){
document.getElementById("face-good-eyes").classList.remove("hidden-face");
document.getElementById("mouth-good").classList.remove("hidden-face");
}else if(mode === "bad"){
document.getElementById("face-bad-eyes").classList.remove("hidden-face");
document.getElementById("mouth-bad").classList.remove("hidden-face");
}else if(mode === "fever"){
document.getElementById("face-fever-eyes").classList.remove("hidden-face");
document.getElementById("mouth-fever").classList.remove("hidden-face");
document.getElementById("fever-sweat").classList.remove("hidden-face");
}else{
document.getElementById("face-normal-eyes").classList.remove("hidden-face");
document.getElementById("mouth-normal").classList.remove("hidden-face");
}
}

function updateCatMessage(){
const condition = conditionInput.value;
const temp = Number(temperatureInput.value);
const sleep = Number(sleepInput.value);
const symptoms = getSelectedSymptoms();

let mode = "normal";
let status = "ふつうモード";
let message = "今日はどんな体調だったか、記録してみようにゃ。";

if(condition === "良い"){
mode = "good";
status = "ごきげんモード";
message = "いい感じにゃ。無理しすぎず、この調子でいくにゃ。";
}else if(condition === "普通"){
mode = "normal";
status = "ふつうモード";
message = "ふつうの日も大事にゃ。少しずつ整えていくにゃ。";
}else if(condition === "悪い"){
mode = "bad";
status = "しょんぼりモード";
message = "しんどい日はがんばりすぎ禁止にゃ。休息優先にゃ。";
}

if(!isNaN(temp) && temp >= 37.5){
mode = "fever";
status = "ぐったりモード";
message = "熱が高めにゃ。今日はゆっくり休むにゃ。";
}else if(!isNaN(sleep) && sleep > 0 && sleep < 5){
mode = "bad";
status = "ねむねむモード";
message = "睡眠が少なめにゃ。今日は早めに休めるといいにゃ。";
}else if(symptoms.length >= 3){
mode = "bad";
status = "注意モード";
message = "症状が多めにゃ。予定を詰めすぎない方がよさそうにゃ。";
}

catStatusEl.textContent = status;
catMessageEl.textContent = message;
showFace(mode);
}

function resetQuickCondition(){
document.querySelectorAll('input[name="quickCondition"]').forEach(r => r.checked = false);
}

function resetForm(){
setToday();
temperatureInput.value = "";
conditionInput.value = "";
sleepInput.value = "";
memoInput.value = "";
morningMedInput.checked = false;
noonMedInput.checked = false;
nightMedInput.checked = false;
setSelectedSymptoms([]);
resetQuickCondition();
editId = null;
document.getElementById("formTitle").textContent = "体調を記録する";
saveBtn.textContent = "保存";
cancelEditBtn.style.display = "none";
updateCatMessage();
}

function saveRecord(){
const date = dateInput.value;
const temperature = temperatureInput.value;
const condition = conditionInput.value;
const sleep = sleepInput.value;
const memo = memoInput.value.trim();

if(!date || !temperature || !condition || !sleep){
alert("日付・体温・体調・睡眠時間は必須です。");
return;
}

const item = {
id: editId || Date.now(),
date,
temperature: Number(temperature).toFixed(1),
condition,
sleep: Number(sleep).toFixed(1),
morningMed: morningMedInput.checked,
noonMed: noonMedInput.checked,
nightMed: nightMedInput.checked,
symptoms: getSelectedSymptoms(),
memo
};

if(editId){
const idx = records.findIndex(x => x.id === editId);
if(idx !== -1) records[idx] = item;
}else{
records.push(item);
}

records.sort((a,b) => b.date.localeCompare(a.date));
saveRecords();
resetForm();
renderAll();

const cat = document.querySelector(".cat-svg");
cat.classList.remove("jump");
void cat.offsetWidth;
cat.classList.add("jump");
}

function editRecord(id){
const item = records.find(x => x.id === id);
if(!item) return;

editId = id;
dateInput.value = item.date;
temperatureInput.value = item.temperature;
conditionInput.value = item.condition;
sleepInput.value = item.sleep;
memoInput.value = item.memo || "";
morningMedInput.checked = !!item.morningMed;
noonMedInput.checked = !!item.noonMed;
nightMedInput.checked = !!item.nightMed;
setSelectedSymptoms(item.symptoms || []);
resetQuickCondition();

if(item.condition){
const quick = document.querySelector(`input[name="quickCondition"][value="${item.condition}"]`);
if(quick) quick.checked = true;
}

document.getElementById("formTitle").textContent = "記録を編集する";
saveBtn.textContent = "更新";
cancelEditBtn.style.display = "inline-block";
updateCatMessage();
document.getElementById("section-form").scrollIntoView({behavior:"smooth",block:"start"});
}

function deleteRecord(id){
if(!confirm("この記録を削除しますか？")) return;
records = records.filter(x => x.id !== id);
saveRecords();
renderAll();
}

function getFilteredRecords(){
let list = [...records];

if(monthFilter.value) list = list.filter(x => x.date.startsWith(monthFilter.value));
if(conditionFilter.value) list = list.filter(x => x.condition === conditionFilter.value);

const keyword = keywordFilter.value.trim().toLowerCase();
if(keyword){
list = list.filter(x => {
const memo = (x.memo || "").toLowerCase();
const symptoms = (x.symptoms || []).join(" ").toLowerCase();
return memo.includes(keyword) || symptoms.includes(keyword);
});
}

return list;
}

function updateSummary(list){
const temps = list.map(x => Number(x.temperature)).filter(x => !isNaN(x));
const sleeps = list.map(x => Number(x.sleep)).filter(x => !isNaN(x));

totalCountEl.textContent = list.length;
avgTempEl.textContent = temps.length ? (temps.reduce((a,b)=>a+b,0) / temps.length).toFixed(1) + "℃" : "0℃";
avgSleepEl.textContent = sleeps.length ? (sleeps.reduce((a,b)=>a+b,0) / sleeps.length).toFixed(1) + "時間" : "0時間";
badCountEl.textContent = list.filter(x => x.condition === "悪い").length;
}

function updateSymptomRanking(list){
const map = {};
list.forEach(x => {
(x.symptoms || []).forEach(s => map[s] = (map[s] || 0) + 1);
});

symptomRankingEl.innerHTML = "";
const ranked = Object.entries(map).sort((a,b) => b[1] - a[1]).slice(0,10);

if(!ranked.length){
symptomRankingEl.innerHTML = "<li>まだデータがありません</li>";
return;
}

ranked.forEach(([name,count]) => {
const li = document.createElement("li");
li.textContent = `${name}：${count}回`;
symptomRankingEl.appendChild(li);
});
}

function drawLineChart(ctx, canvas, data, key, title, color){
ctx.clearRect(0,0,canvas.width,canvas.height);

const width = canvas.width;
const height = canvas.height;
const padding = 50;

if(!data.length){
ctx.fillStyle = "#999";
ctx.font = "20px sans-serif";
ctx.fillText("データがありません", width / 2 - 80, height / 2);
return;
}

const values = data.map(x => Number(x[key]));
const labels = data.map(x => x.date.slice(5));
let min = Math.min(...values);
let max = Math.max(...values);

if(min === max){
min -= 1;
max += 1;
}

const axisColor = getComputedStyle(document.body).getPropertyValue("--text").trim();
const gridColor = getComputedStyle(document.body).getPropertyValue("--line").trim();

ctx.strokeStyle = axisColor;
ctx.beginPath();
ctx.moveTo(padding,padding);
ctx.lineTo(padding,height-padding);
ctx.lineTo(width-padding,height-padding);
ctx.stroke();

const steps = 5;
for(let i=0;i<=steps;i++){
const y = padding + ((height-padding*2)/steps)*i;
const val = max - ((max-min)/steps)*i;

ctx.strokeStyle = gridColor;
ctx.beginPath();
ctx.moveTo(padding,y);
ctx.lineTo(width-padding,y);
ctx.stroke();

ctx.fillStyle = axisColor;
ctx.font = "12px sans-serif";
ctx.fillText(val.toFixed(1), 8, y + 4);
}

const xStep = data.length > 1 ? (width-padding*2)/(data.length-1) : 0;

ctx.strokeStyle = color;
ctx.lineWidth = 2;
ctx.beginPath();

data.forEach((item, i) => {
const x = data.length === 1 ? width/2 : padding + xStep*i;
const y = height-padding - ((Number(item[key])-min)/(max-min))*(height-padding*2);
if(i === 0) ctx.moveTo(x,y);
else ctx.lineTo(x,y);
});
ctx.stroke();

data.forEach((item, i) => {
const x = data.length === 1 ? width/2 : padding + xStep*i;
const y = height-padding - ((Number(item[key])-min)/(max-min))*(height-padding*2);

ctx.fillStyle = color;
ctx.beginPath();
ctx.arc(x,y,4,0,Math.PI*2);
ctx.fill();

ctx.fillStyle = axisColor;
ctx.font = "11px sans-serif";
ctx.fillText(labels[i], x - 15, height-padding + 18);
});

ctx.fillStyle = axisColor;
ctx.font = "bold 16px sans-serif";
ctx.fillText(title, padding, 24);
}

function renderTable(list){
recordList.innerHTML = "";

if(!list.length){
recordList.innerHTML = `<tr><td colspan="8">記録がありません</td></tr>`;
return;
}

list.forEach(item => {
const tr = document.createElement("tr");
tr.className = item.condition === "良い" ? "row-good" : item.condition === "普通" ? "row-normal" : "row-bad";

const med = [
item.morningMed ? "朝" : "",
item.noonMed ? "昼" : "",
item.nightMed ? "夜" : ""
].filter(Boolean).join("・") || "なし";

const statusClass = item.condition === "良い" ? "status-good" : item.condition === "普通" ? "status-normal" : "status-bad";

tr.innerHTML = `
<td>${item.date}</td>
<td>${item.temperature}℃</td>
<td><span class="status ${statusClass}">${item.condition}</span></td>
<td>${item.sleep}時間</td>
<td>${med}</td>
<td>${(item.symptoms || []).join("、") || "なし"}</td>
<td>${escapeHtml(item.memo || "")}</td>
<td>
<div class="actions">
<button class="btn btn-warning" type="button" onclick="editRecord(${item.id})">編集</button>
<button class="btn btn-danger" type="button" onclick="deleteRecord(${item.id})">削除</button>
</div>
</td>
`;
recordList.appendChild(tr);
});
}

function renderAll(){
const filtered = getFilteredRecords();
updateSummary(filtered);
updateSymptomRanking(filtered);
renderTable(filtered);

const chartData = [...filtered].sort((a,b) => a.date.localeCompare(b.date));
drawLineChart(tempCtx, tempCanvas, chartData, "temperature", "体温グラフ", "#4a90e2");
drawLineChart(sleepCtx, sleepCanvas, chartData, "sleep", "睡眠時間グラフ", "#8b5cf6");
}

function exportJSON(){
const blob = new Blob([JSON.stringify(records, null, 2)], {type:"application/json"});
const url = URL.createObjectURL(blob);
const a = document.createElement("a");
a.href = url;
a.download = "cat-health-records.json";
a.click();
URL.revokeObjectURL(url);
}

function importJSON(file){
const reader = new FileReader();
reader.onload = e => {
try{
const data = JSON.parse(e.target.result);
if(!Array.isArray(data)) throw new Error();
records = data;
saveRecords();
renderAll();
alert("読み込みました。");
}catch{
alert("JSONの読み込みに失敗しました。");
}
};
reader.readAsText(file, "utf-8");
}

function applyTheme(theme){
if(theme === "dark"){
document.body.classList.add("dark");
themeBtn.textContent = "☀️ ライトモード";
}else{
document.body.classList.remove("dark");
themeBtn.textContent = "🌙 ダークモード";
}
localStorage.setItem(THEME_KEY, theme);
renderAll();
}

document.querySelectorAll('input[name="quickCondition"]').forEach(radio => {
radio.addEventListener("change", e => {
conditionInput.value = e.target.value;
updateCatMessage();
});
});

themeBtn.addEventListener("click", () => {
const next = document.body.classList.contains("dark") ? "light" : "dark";
applyTheme(next);
});

printBtn.addEventListener("click", () => window.print());
saveBtn.addEventListener("click", saveRecord);
cancelEditBtn.addEventListener("click", resetForm);
todayBtn.addEventListener("click", setToday);
exportBtn.addEventListener("click", exportJSON);
importBtn.addEventListener("click", () => importFile.click());
document.getElementById("exportTabBtn").addEventListener("click", exportJSON);
document.getElementById("importTabBtn").addEventListener("click", () => importFile.click());

importFile.addEventListener("change", e => {
const file = e.target.files[0];
if(file) importJSON(file);
});

clearBtn.addEventListener("click", () => {
if(!confirm("本当に全データを削除しますか？")) return;
records = [];
saveRecords();
renderAll();
resetForm();
});

showAllBtn.addEventListener("click", () => {
monthFilter.value = "";
conditionFilter.value = "";
keywordFilter.value = "";
renderAll();
});

[temperatureInput, conditionInput, sleepInput, memoInput, monthFilter, conditionFilter, keywordFilter].forEach(el => {
el.addEventListener("input", () => {
updateCatMessage();
renderAll();
});
el.addEventListener("change", () => {
updateCatMessage();
renderAll();
});
});

symptomBox.querySelectorAll('input[type="checkbox"]').forEach(cb => {
cb.addEventListener("change", updateCatMessage);
});

[morningMedInput, noonMedInput, nightMedInput].forEach(cb => {
cb.addEventListener("change", updateCatMessage);
});

document.querySelectorAll(".tab-btn[data-target]").forEach(btn => {
btn.addEventListener("click", () => {
document.querySelectorAll(".tab-btn").forEach(x => x.classList.remove("active"));
btn.classList.add("active");
const target = document.getElementById(btn.dataset.target);
if(target) target.scrollIntoView({behavior:"smooth", block:"start"});
});
});

window.addEventListener("beforeinstallprompt", e => {
e.preventDefault();
deferredPrompt = e;
if(installBox){
installBox.classList.add("show");
}
});

if(installBtn){
installBtn.addEventListener("click", async () => {
if(!deferredPrompt) return;
deferredPrompt.prompt();
await deferredPrompt.userChoice;
deferredPrompt = null;
installBox.classList.remove("show");
});
}

if("serviceWorker" in navigator){
window.addEventListener("load", () => {
navigator.serviceWorker.register("./sw.js").catch(console.error);
});
}

setToday();
resetForm();
renderAll();
updateCatMessage();
applyTheme(localStorage.getItem(THEME_KEY) || "light");

window.editRecord = editRecord;
window.deleteRecord = deleteRecord;
</script>
</body>
</html>
