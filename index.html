<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>猫の体調管理アプリ Ultimate</title>

<style>

body{
font-family:sans-serif;
margin:0;
background:#f6f9ff;
}

/* 共通カード */
.card{
background:#fff;
border-radius:16px;
padding:16px;
margin:16px;
box-shadow:0 4px 10px rgba(0,0,0,0.05);
}

/* グリッド */
.choice-grid{
display:grid;
grid-template-columns:repeat(3,1fr);
gap:10px;
}

.choice-item label{
display:flex;
align-items:center;
gap:8px;
padding:10px;
border:1px solid #ddd;
border-radius:10px;
}

/* ↓↓↓ここが今回の最重要修正↓↓↓ */
@media screen and (max-width:768px){

html,body{
width:100%;
overflow-x:hidden;
}

.choice-grid{
grid-template-columns:1fr !important;
}

.choice-item label{
display:flex !important;
flex-direction:row !important;
align-items:center !important;
gap:10px !important;

writing-mode:horizontal-tb !important;
text-orientation:mixed !important;

white-space:normal !important;
word-break:keep-all !important;
overflow-wrap:break-word !important;

font-size:16px;
}

}

/* 下メニュー */
.bottom{
position:fixed;
bottom:0;
width:100%;
background:#fff;
display:grid;
grid-template-columns:repeat(4,1fr);
padding:10px;
box-shadow:0 -3px 10px rgba(0,0,0,0.1);
}

.bottom div{
text-align:center;
}

</style>
</head>

<body>

<div class="card">
<h2>今日のクイック状態</h2>

<div class="choice-grid">
<div class="choice-item"><label><input type="radio">元気</label></div>
<div class="choice-item"><label><input type="radio">まあまあ</label></div>
<div class="choice-item"><label><input type="radio">しんどい</label></div>
</div>

</div>

<div class="card">
<h2>服薬チェック</h2>

<div class="choice-grid">
<div class="choice-item"><label><input type="checkbox">朝 飲んだ</label></div>
<div class="choice-item"><label><input type="checkbox">昼 飲んだ</label></div>
<div class="choice-item"><label><input type="checkbox">夜 飲んだ</label></div>
</div>

</div>

<div class="card">
<h2>症状チェック</h2>

<div class="choice-grid">
<div class="choice-item"><label><input type="checkbox">頭痛</label></div>
<div class="choice-item"><label><input type="checkbox">だるさ</label></div>
<div class="choice-item"><label><input type="checkbox">吐き気</label></div>
<div class="choice-item"><label><input type="checkbox">発熱</label></div>
<div class="choice-item"><label><input type="checkbox">喉の痛み</label></div>
<div class="choice-item"><label><input type="checkbox">腹痛</label></div>
<div class="choice-item"><label><input type="checkbox">めまい</label></div>
<div class="choice-item"><label><input type="checkbox">不安感</label></div>
<div class="choice-item"><label><input type="checkbox">食欲低下</label></div>
</div>

</div>

<!-- 下メニュー -->
<div class="bottom">
<div>✍️<br>記録</div>
<div>🔔<br>通知</div>
<div>💾<br>保存</div>
<div>📊<br>集計</div>
</div>

</body>
</html>
